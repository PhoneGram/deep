<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - الدخلّ</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <!-- الهيدر -->
    <header class="app-header">
        <h1>الدخلّ</h1>
    </header>

    <!-- صفحة تسجيل الدخول -->
    <div class="login-page">
        <div class="login-container">
            <!-- الشعار الصغير -->
            <div class="login-logo">
                <img src="../assets/logo.png" alt="الدخلّ" class="login-logo-img">
            </div>

            <h2 class="login-title">تسجيل الدخول</h2>
            <p class="login-subtitle">أدخل بيانات حسابك للدخول</p>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">اسم المستخدم</label>
                    <input type="text" id="username" class="form-control" placeholder="أدخل اسم المستخدم" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" class="form-control" placeholder="أدخل كلمة المرور" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                    <span>🔑</span> تسجيل الدخول
                </button>
            </form>

            <!-- الأزرار السفلية -->
            <div class="login-actions">
                <button class="btn btn-outline btn-full" id="qrBtn">
                    <span>📷</span> قراءة QR
                </button>
                
                <button class="btn btn-outline btn-full" id="registerBtn">
                    <span>📝</span> تسجيل حساب جديد
                </button>
            </div>

            <!-- رسالة الخطأ -->
            <div id="loginError" class="login-error" style="display: none;">
                ⚠️ <span id="errorMessage">بيانات غير صحيحة</span>
            </div>
        </div>
    </div>

    <!-- نافذة اختيار منصة التواصل -->
    <div class="modal-overlay" id="contactModal">
        <div class="modal-content">
            <button class="modal-close" id="contactModalClose">✕</button>
            <h3 class="text-center mb-20">اختر منصة للتواصل مع المدير</h3>
            <div class="contact-platforms">
                <button class="platform-btn facebook" data-platform="facebook">
                    <span>📘</span> فيسبوك
                </button>
                <button class="platform-btn whatsapp" data-platform="whatsapp">
                    <span>💬</span> واتساب
                </button>
                <button class="platform-btn instagram" data-platform="instagram">
                    <span>📸</span> انستاغرام
                </button>
                <button class="platform-btn telegram" data-platform="telegram">
                    <span>✈️</span> تيليجرام
                </button>
                <button class="platform-btn tiktok" data-platform="tiktok">
                    <span>🎵</span> تيكتوك
                </button>
            </div>
        </div>
    </div>

    <!-- نافذة اختيار صورة QR -->
    <input type="file" id="qrFileInput" accept="image/*" style="display: none;">

    <script src="../js/app.js"></script>
</body>
</html>
